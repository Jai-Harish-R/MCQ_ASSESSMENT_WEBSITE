# Server Configuration
server.port=8080

# Spring Mail SMTP Settings (Templates provided for Gmail and Mailtrap)
# For Gmail, you will need to generate a Google App Password (not your primary password)
# For Mailtrap, copy your SMTP Username/Password from your Mailtrap Inbox Settings

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-google-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Alternate Mailtrap Config (Uncomment to use)
# spring.mail.host=sandbox.smtp.mailtrap.io
# spring.mail.port=2525
# spring.mail.username=mailtrap-username
# spring.mail.password=mailtrap-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
